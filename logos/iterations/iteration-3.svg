<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 600">

  <!-- Background -->
  <g id="background">
    <rect width="512" height="600" fill="#0B0608"/>
  </g>

  <!-- Corner Ornaments (open Art Déco, no closed frame) -->
