    <!-- Top-left corner -->
    <line x1="28" y1="68" x2="28" y2="40" stroke="#C41E3A" stroke-width="2"/>
    <line x1="68" y1="28" x2="40" y2="28" stroke="#C41E3A" stroke-width="2"/>
    <line x1="36" y1="74" x2="36" y2="48" stroke="#5C1428" stroke-width="1.5"/>
    <line x1="74" y1="36" x2="48" y2="36" stroke="#5C1428" stroke-width="1.5"/>
    <polygon points="28,28 40,34 34,40 22,34" fill="#C41E3A"/>

    <!-- Top-right corner -->
    <line x1="484" y1="68" x2="484" y2="40" stroke="#C41E3A" stroke-width="2"/>
    <line x1="444" y1="28" x2="472" y2="28" stroke="#C41E3A" stroke-width="2"/>
    <line x1="476" y1="74" x2="476" y2="48" stroke="#5C1428" stroke-width="1.5"/>
    <line x1="438" y1="36" x2="464" y2="36" stroke="#5C1428" stroke-width="1.5"/>
    <polygon points="484,28 472,34 478,40 490,34" fill="#C41E3A"/>

    <!-- Bottom-left corner -->
    <line x1="28" y1="532" x2="28" y2="560" stroke="#C41E3A" stroke-width="2"/>
    <line x1="68" y1="572" x2="40" y2="572" stroke="#C41E3A" stroke-width="2"/>
    <line x1="36" y1="526" x2="36" y2="552" stroke="#5C1428" stroke-width="1.5"/>
    <line x1="74" y1="564" x2="48" y2="564" stroke="#5C1428" stroke-width="1.5"/>
    <polygon points="28,572 40,566 34,560 22,566" fill="#C41E3A"/>

    <!-- Bottom-right corner -->
    <line x1="484" y1="532" x2="484" y2="560" stroke="#C41E3A" stroke-width="2"/>
    <line x1="444" y1="572" x2="472" y2="572" stroke="#C41E3A" stroke-width="2"/>
    <line x1="476" y1="526" x2="476" y2="552" stroke="#5C1428" stroke-width="1.5"/>
    <line x1="438" y1="564" x2="464" y2="564" stroke="#5C1428" stroke-width="1.5"/>
    <polygon points="484,572 472,566 478,560 490,566" fill="#C41E3A"/>

  </g>

  <!-- Top Ornamental Rule -->
  <g id="top-rule">
    <line x1="80" y1="92" x2="432" y2="92" stroke="#5C1428" stroke-width="1.5"/>
    <line x1="80" y1="95" x2="432" y2="95" stroke="#C41E3A" stroke-width="0.8" stroke-opacity="0.7"/>
    <line x1="80" y1="98" x2="432" y2="98" stroke="#5C1428" stroke-width="1.5"/>
    <!-- Center diamond -->
    <polygon points="256,92 260,95 256,98 252,95" fill="#C41E3A"/>
    <!-- Flanking golden diamonds -->
    <polygon points="180,95 184,92 188,95 184,98" fill="#8B6B4A" opacity="0.8"/>
    <polygon points="324,95 328,92 332,95 328,98" fill="#8B6B4A" opacity="0.8"/>
    <!-- Left chevron -->
    <polyline points="100,88 92,95 100,102" fill="none" stroke="#5C1428" stroke-width="1.5"/>
    <!-- Right chevron -->
    <polyline points="412,88 420,95 412,102" fill="none" stroke="#5C1428" stroke-width="1.5"/>
  </g>

