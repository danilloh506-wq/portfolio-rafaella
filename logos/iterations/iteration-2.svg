    <line x1="370" y1="173" x2="980" y2="173" stroke="#C41E3A" stroke-width="0.7" stroke-opacity="0.7"/>
    <line x1="370" y1="176" x2="980" y2="176" stroke="#5C1428" stroke-width="1.2"/>
    <!-- Losango no centro da régua superior -->
    <polygon points="676,170 680,173 676,176 672,173" fill="#C41E3A"/>

    <!-- RAFAELLA — letra por letra como paths, cap height ~90px, baseline y=276 -->

    <!-- R -->
    <path fill="#F5EDE6" d="M 380 182 L 380 276 L 390 276 L 390 236 L 406 236 L 424 276 L 436 276 L 416 233 C 427 228, 433 218, 433 205 C 433 187, 421 182, 402 182 Z M 390 193 L 402 193 C 412 193, 422 197, 422 210 C 422 224, 412 228, 402 228 L 390 228 Z"/>

    <!-- A -->
    <path fill="#F5EDE6" d="M 462 182 L 434 276 L 445 276 L 452 252 L 482 252 L 489 276 L 501 276 L 472 182 Z M 467 193 L 479 238 L 455 238 Z"/>

    <!-- F -->
    <path fill="#F5EDE6" d="M 514 182 L 514 276 L 525 276 L 525 230 L 560 230 L 560 220 L 525 220 L 525 193 L 563 193 L 563 182 Z"/>

    <!-- A -->
    <path fill="#F5EDE6" d="M 590 182 L 562 276 L 573 276 L 580 252 L 610 252 L 617 276 L 629 276 L 600 182 Z M 595 193 L 607 238 L 583 238 Z"/>

    <!-- E -->
    <path fill="#F5EDE6" d="M 642 182 L 642 276 L 694 276 L 694 266 L 653 266 L 653 230 L 688 230 L 688 220 L 653 220 L 653 193 L 692 193 L 692 182 Z"/>

    <!-- L -->
    <path fill="#F5EDE6" d="M 706 182 L 706 276 L 752 276 L 752 266 L 717 266 L 717 182 Z"/>

    <!-- L -->
    <path fill="#F5EDE6" d="M 765 182 L 765 276 L 811 276 L 811 266 L 776 266 L 776 182 Z"/>

    <!-- A -->
    <path fill="#F5EDE6" d="M 838 182 L 810 276 L 821 276 L 828 252 L 858 252 L 865 276 L 877 276 L 848 182 Z M 843 193 L 855 238 L 831 238 Z"/>

    <!-- Régua ornamental inferior entre RAFAELLA e COSTA -->
    <line x1="370" y1="294" x2="980" y2="294" stroke="#5C1428" stroke-width="1.2"/>
    <line x1="370" y1="297" x2="980" y2="297" stroke="#C41E3A" stroke-width="0.7" stroke-opacity="0.7"/>
    <line x1="370" y1="300" x2="980" y2="300" stroke="#5C1428" stroke-width="1.2"/>
    <!-- Losango central -->
    <polygon points="676,294 680,297 676,300 672,297" fill="#C41E3A"/>

    <!-- Ornamento separador entre as réguas -->
    <circle cx="595" cy="312" r="1.8" fill="#5C1428"/>
    <circle cx="610" cy="312" r="1.8" fill="#5C1428"/>
    <polygon points="626,308 630,312 626,316 622,312" fill="#C41E3A"/>
    <circle cx="642" cy="312" r="1.8" fill="#5C1428"/>
    <circle cx="657" cy="312" r="1.8" fill="#5C1428"/>

