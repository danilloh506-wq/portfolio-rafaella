      C 200 70, 174 76, 162 90
      C 148 106, 144 126, 142 146
      C 140 168, 142 184, 146 200
      C 150 218, 156 230, 154 248
      C 152 266, 144 280, 142 300
      C 138 324, 140 348, 146 370
      C 152 392, 162 410, 164 432
      C 166 450, 162 466, 162 466
      C 162 466, 170 470, 178 470
      C 186 470, 194 466, 196 458
      C 200 444, 198 426, 200 408
      C 202 388, 210 372, 214 352
      C 218 330, 218 308, 216 286
      C 214 264, 208 248, 208 228
      C 208 208, 214 192, 216 172
      C 218 152, 218 132, 212 114
      C 206 96, 200 70, 200 70 Z
    "/>

    <!-- Fenda do vestido (sugestão de abertura lateral direita) -->
    <path fill="#0B0608" opacity="0.7" d="M 212 370 C 213 384, 214 400, 214 416 C 214 430, 213 444, 212 454 L 214 454 C 215 444, 216 430, 216 416 C 216 400, 215 384, 214 370 Z"/>

