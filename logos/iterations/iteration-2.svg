    <path fill="#F5EDE6" opacity="0.85" d="M 576 326 C 555 326, 539 343, 539 364 C 539 385, 555 402, 576 402 C 597 402, 613 385, 613 364 C 613 343, 597 326, 576 326 Z M 576 336 C 591 336, 602 349, 602 364 C 602 379, 591 392, 576 392 C 561 392, 550 379, 550 364 C 550 349, 561 336, 576 336 Z"/>

    <!-- S -->
    <path fill="#F5EDE6" opacity="0.85" d="M 644 326 C 630 326, 620 335, 620 348 C 620 362, 631 367, 644 372 C 655 376, 662 380, 662 390 C 662 397, 655 402, 645 402 C 636 402, 629 398, 624 390 L 616 395 C 622 405, 633 412, 645 412 C 661 412, 673 402, 673 388 C 673 374, 662 369, 648 364 C 638 360, 631 356, 631 348 C 631 341, 637 336, 645 336 C 653 336, 659 340, 663 347 L 671 342 C 665 333, 655 326, 644 326 Z"/>

    <!-- T -->
    <path fill="#F5EDE6" opacity="0.85" d="M 684 326 L 684 336 L 705 336 L 705 412 L 716 412 L 716 336 L 737 336 L 737 326 Z"/>

    <!-- A -->
    <path fill="#F5EDE6" opacity="0.85" d="M 775 326 L 747 412 L 758 412 L 765 390 L 795 390 L 802 412 L 814 412 L 785 326 Z M 780 336 L 792 378 L 768 378 Z"/>

    <!-- Régua ornamental inferior abaixo de COSTA -->
    <line x1="370" y1="424" x2="980" y2="424" stroke="#5C1428" stroke-width="1.2"/>
    <line x1="370" y1="427" x2="980" y2="427" stroke="#C41E3A" stroke-width="0.7" stroke-opacity="0.7"/>
    <line x1="370" y1="430" x2="980" y2="430" stroke="#5C1428" stroke-width="1.2"/>

    <!-- Tagline micro "DESIGNER DE MODA" como série de rects sutis -->
    <g opacity="0.35">
      <rect x="500" y="442" width="7" height="1.2" fill="#F5EDE6"/>
      <rect x="511" y="442" width="7" height="1.2" fill="#F5EDE6"/>
      <rect x="522" y="442" width="7" height="1.2" fill="#F5EDE6"/>
      <rect x="533" y="442" width="7" height="1.2" fill="#F5EDE6"/>
      <circle cx="545" cy="442.6" r="1.4" fill="#C41E3A"/>
      <rect x="551" y="442" width="7" height="1.2" fill="#F5EDE6"/>
      <rect x="562" y="442" width="7" height="1.2" fill="#F5EDE6"/>
      <circle cx="574" cy="442.6" r="1.4" fill="#C41E3A"/>
      <rect x="580" y="442" width="7" height="1.2" fill="#F5EDE6"/>
      <rect x="591" y="442" width="7" height="1.2" fill="#F5EDE6"/>
      <rect x="602" y="442" width="7" height="1.2" fill="#F5EDE6"/>
      <rect x="613" y="442" width="7" height="1.2" fill="#F5EDE6"/>
