    <path fill="none" stroke="#F5EDE6" stroke-width="1.5" stroke-linecap="round" opacity="0.15" d="M 152 110 C 148 140, 146 176, 150 210 C 154 244, 160 268, 158 302 C 156 336, 150 362, 152 398"/>

  </g>

  <!-- DIVISÓRIA ART DÉCO -->
  <g id="divider-deco">

    <!-- Linhas verticais triplas -->
    <line x1="330" y1="90" x2="330" y2="422" stroke="#5C1428" stroke-width="1"/>
    <line x1="336" y1="90" x2="336" y2="422" stroke="#C41E3A" stroke-width="0.6" stroke-opacity="0.6"/>
    <line x1="342" y1="90" x2="342" y2="422" stroke="#5C1428" stroke-width="1"/>

    <!-- Losango central -->
    <polygon points="336,256 340,260 336,264 332,260" fill="#C41E3A"/>

    <!-- Losangos secundários -->
    <polygon points="336,200 340,204 336,208 332,204" fill="#8B6B4A" opacity="0.7"/>
    <polygon points="336,312 340,316 336,320 332,316" fill="#8B6B4A" opacity="0.7"/>

    <!-- Chevron topo -->
    <polyline points="324,100 330,90 336,100" fill="none" stroke="#C41E3A" stroke-width="1.5"/>

    <!-- Chevron base -->
    <polyline points="324,412 330,422 336,412" fill="none" stroke="#C41E3A" stroke-width="1.5"/>

  </g>

