    <path fill="#F5EDE6" opacity="0.85" d="M 504 326 C 484 326, 468 343, 468 364 C 468 385, 484 402, 504 402 C 517 402, 528 395, 535 385 L 526 380 C 521 388, 513 392, 504 392 C 490 392, 479 380, 479 364 C 479 348, 490 336, 504 336 C 513 336, 521 340, 526 348 L 535 343 C 528 333, 517 326, 504 326 Z"/>

