<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- BACKGROUND -->
  <g id="background">
    <rect width="512" height="512" fill="#0B0608"/>
  </g>

  <!-- MOLDURA ART DÉCO -->
  <g id="frame">

    <!-- Retângulos da moldura -->
    <rect x="28" y="28" width="456" height="456" fill="none" stroke="#5C1428" stroke-width="2"/>
    <rect x="36" y="36" width="440" height="440" fill="none" stroke="#5C1428" stroke-width="1"/>
    <rect x="42" y="42" width="428" height="428" fill="none" stroke="#C41E3A" stroke-width="1" stroke-opacity="0.5"/>

    <!-- CANTO TOP-LEFT -->
    <polygon points="28,28 44,36 36,44 20,36" fill="#C41E3A"/>
    <line x1="28" y1="72" x2="28" y2="48" stroke="#C41E3A" stroke-width="2"/>
    <line x1="72" y1="28" x2="48" y2="28" stroke="#C41E3A" stroke-width="2"/>
    <polygon points="28,56 31,60 28,64 25,60" fill="#C41E3A"/>
    <polygon points="56,28 60,31 64,28 60,25" fill="#C41E3A"/>

    <!-- CANTO TOP-RIGHT (x espelhado em 484) -->
    <polygon points="484,28 468,36 476,44 492,36" fill="#C41E3A"/>
    <line x1="484" y1="72" x2="484" y2="48" stroke="#C41E3A" stroke-width="2"/>
    <line x1="440" y1="28" x2="464" y2="28" stroke="#C41E3A" stroke-width="2"/>
    <polygon points="484,56 481,60 484,64 487,60" fill="#C41E3A"/>
    <polygon points="456,28 452,31 448,28 452,25" fill="#C41E3A"/>

    <!-- CANTO BOTTOM-LEFT (y espelhado em 484) -->
    <polygon points="28,484 44,476 36,468 20,476" fill="#C41E3A"/>
    <line x1="28" y1="440" x2="28" y2="464" stroke="#C41E3A" stroke-width="2"/>
    <line x1="72" y1="484" x2="48" y2="484" stroke="#C41E3A" stroke-width="2"/>
    <polygon points="28,456 31,452 28,448 25,452" fill="#C41E3A"/>
    <polygon points="56,484 60,481 64,484 60,487" fill="#C41E3A"/>

    <!-- CANTO BOTTOM-RIGHT (espelhado em ambos) -->
    <polygon points="484,484 468,476 476,468 492,476" fill="#C41E3A"/>
    <line x1="484" y1="440" x2="484" y2="464" stroke="#C41E3A" stroke-width="2"/>
    <line x1="440" y1="484" x2="464" y2="484" stroke="#C41E3A" stroke-width="2"/>
    <polygon points="484,456 481,452 484,448 487,452" fill="#C41E3A"/>
    <polygon points="456,484 452,481 448,484 452,487" fill="#C41E3A"/>

    <!-- RÉGUA SUPERIOR -->
    <line x1="80" y1="134" x2="432" y2="134" stroke="#5C1428" stroke-width="1.5"/>
    <line x1="80" y1="137" x2="432" y2="137" stroke="#C41E3A" stroke-width="0.8" stroke-opacity="0.7"/>
    <line x1="80" y1="140" x2="432" y2="140" stroke="#5C1428" stroke-width="1.5"/>
    <!-- Losango central -->
    <polygon points="256,134 260,137 256,140 252,137" fill="#C41E3A"/>
    <!-- Losangos flanqueadores -->
    <polygon points="180,134 183,137 180,140 177,137" fill="#8B6B4A" opacity="0.8"/>
    <polygon points="332,134 335,137 332,140 329,137" fill="#8B6B4A" opacity="0.8"/>

    <!-- RÉGUA INFERIOR -->
    <line x1="80" y1="370" x2="432" y2="370" stroke="#5C1428" stroke-width="1.5"/>
    <line x1="80" y1="373" x2="432" y2="373" stroke="#C41E3A" stroke-width="0.8" stroke-opacity="0.7"/>
    <line x1="80" y1="376" x2="432" y2="376" stroke="#5C1428" stroke-width="1.5"/>
    <!-- Losango central -->
    <polygon points="256,370 260,373 256,376 252,373" fill="#C41E3A"/>
    <!-- Losangos flanqueadores -->
    <polygon points="180,370 183,373 180,376 177,373" fill="#8B6B4A" opacity="0.8"/>
    <polygon points="332,370 335,373 332,376 329,373" fill="#8B6B4A" opacity="0.8"/>

  </g>

  <!-- ÍCONE CENTRAL — DRAPE FLUIDO -->
  <g id="icon-fluid" transform="translate(256,255) scale(0.38)">

    <!-- Asa esquerda (crimson) -->
    <path fill="#C41E3A" d="M 0,-200 C -8,-198 -26,-190 -42,-174 C -60,-156 -70,-130 -70,-102 C -70,-74 -58,-52 -52,-28 C -46,-4 -48,10 -56,-6 C -64,11 -78,24 -84,44 C -91,66 -88,92 -78,114 C -68,136 -52,156 -40,171 C -32,180 -22,188 -14,194 C -20,186 -30,170 -34,150 C -38,128 -32,106 -24,84 C -16,62 -8,38 -8,-10 C -8,-36 -18,-56 -24,-80 C -30,-104 -32,-126 -26,-150 C -20,-174 -8,-196 0,-216 C 2,-228 2,-212 0,-200 Z"/>

    <!-- Asa direita (wine) -->
    <path fill="#5C1428" d="M 0,-200 C 8,-198 26,-190 42,-174 C 60,-156 70,-130 70,-102 C 70,-74 58,-52 52,-28 C 46,-4 48,10 56,-6 C 64,11 78,24 84,44 C 91,66 88,92 78,114 C 68,136 52,156 40,171 C 32,180 22,188 14,194 C 20,186 30,170 34,150 C 38,128 32,106 24,84 C 16,62 8,38 8,-10 C 8,-36 18,-56 24,-80 C 30,-104 32,-126 26,-150 C 20,-174 8,-196 0,-216 C -2,-228 -2,-212 0,-200 Z"/>

    <!-- Fenda central -->
    <path fill="none" stroke="#0B0608" stroke-width="2.5" stroke-linecap="round" d="M 0,-196 C -2,-162 -3,-122 0,-82 C 2,-47 5,-22 3,10 C 1,42 -3,70 -1,106 C 1,138 5,166 2,200" opacity="0.8"/>

    <!-- Highlight de seda esquerdo -->
    <path fill="none" stroke="#F5EDE6" stroke-width="1.4" stroke-linecap="round" opacity="0.2" d="M -38,-112 C -46,-88 -52,-58 -50,-30 C -48,-4 -40,16 -38,40 C -36,62 -40,82 -46,104 C -52,126 -60,146 -60,170"/>

    <!-- Nó superior -->
    <ellipse cx="0" cy="-206" rx="16" ry="10" fill="#C41E3A"/>
    <ellipse cx="-4" cy="-208" rx="5" ry="3" fill="#F5EDE6" opacity="0.3" transform="rotate(-15 -4 -208)"/>

  </g>

  <!-- WORDMARK INFERIOR -->
  <g id="wordmark">

    <!-- RAFAELLA -->
    <text
      font-family="Georgia, 'Times New Roman', serif"
      font-size="22"
      letter-spacing="8"
      fill="#F5EDE6"
      text-anchor="middle"
      x="256"
      y="408">RAFAELLA</text>

    <!-- Ornamento diamante entre as duas palavras -->
    <polygon points="256,416 259,420 256,424 253,420" fill="#C41E3A"/>

    <!-- COSTA -->
    <text
      font-family="Georgia, 'Times New Roman', serif"
      font-size="13"
      letter-spacing="10"
      fill="#F5EDE6"
      opacity="0.75"
      text-anchor="middle"
      x="256"
      y="436">COSTA</text>

  </g>

</svg>
