      M 162,261
      C 174,261 186,264 194,272
      C 206,283 220,306 232,330
      L 244,349
      L 227,349
      C 218,334 206,313 196,301
      C 188,292 178,287 165,287
      L 148,287
      L 148,261
      L 162,261
      Z
    " fill="#F5EDE6"/>

    <!--
      ═══════════════════════════════════════════
