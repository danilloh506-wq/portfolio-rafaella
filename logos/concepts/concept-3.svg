      M 118,170
      L 118,340

      M 118,170
      L 118,170
      C 118,170 162,170 175,170
      C 198,170 218,178 222,198
      C 228,222 218,244 196,250
      C 186,253 174,254 162,254

      M 162,254
      L 118,254

      M 175,254
      C 185,254 195,256 200,262
      C 210,272 222,295 236,320
      L 248,340
    "
    fill="none" stroke="#F5EDE6" stroke-width="18" stroke-linecap="square" stroke-linejoin="miter"/>

    <!-- R — filled version using closed paths for solid letter -->
    <!-- Stem -->
