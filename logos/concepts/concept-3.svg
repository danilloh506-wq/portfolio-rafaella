      ═══════════════════════════════════════════
      LETTER "R" — Serif caps, Art Déco 1940s
      Position: left of center, x≈118, y≈170
      Hand-crafted path: stem + rounded bowl + leg
      ═══════════════════════════════════════════
    -->
