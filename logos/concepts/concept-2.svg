<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512">

  <!-- ═══════════════════════════════════════════════════════
       RAFAELLA COSTA — Concept 2
       Combination Mark: Silhouette Icon + Serifed Wordmark
       Mood: Noir Cinematográfico · Glamour Hollywood 40-50s
       Palette: #C41E3A · #5C1428 · #0B0608 · #F5EDE6
  ═══════════════════════════════════════════════════════ -->

  <!-- ── BACKGROUND ── -->
  <g id="background">
    <rect width="1024" height="512" fill="#0B0608"/>
    <!-- Subtle vignette gradient for depth -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0810" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0B0608" stop-opacity="0.7"/>
    </radialGradient>
    <rect width="1024" height="512" fill="url(#vignette)"/>
  </g>

  <!-- ── ICON: Feminine Silhouette (back view, tube dress) ── -->
  <!-- Centered at x≈170, spanning roughly y=56 to y=456 (400px tall) -->
  <g id="icon">

    <!-- Main silhouette: back view of strapless tube dress
         Starting from top of shoulders, curving inward to waist,
         flaring to hips, then falling to hem with slight flare.
         The path traces the outer contour as a single filled shape. -->
    <path
      fill="#C41E3A"
      d="
        M 170 58

        C 170 58, 148 62, 138 72
        C 126 84, 122 98, 120 112
        C 118 128, 119 140, 122 152
        C 125 166, 130 174, 128 186
        C 126 198, 120 208, 118 224
        C 115 244, 116 262, 120 278
        C 125 298, 134 312, 136 330
        C 138 348, 134 364, 132 382
        C 130 400, 130 418, 136 436
        C 140 448, 148 456, 158 460
        C 164 462, 170 462, 170 462

        C 170 462, 176 462, 182 460
        C 192 456, 200 448, 204 436
        C 210 418, 210 400, 208 382
        C 206 364, 202 348, 204 330
        C 206 312, 215 298, 220 278
        C 224 262, 225 244, 222 224
        C 220 208, 214 198, 212 186
        C 210 174, 215 166, 218 152
        C 221 140, 222 128, 220 112
        C 218 98, 214 84, 202 72
        C 192 62, 170 58, 170 58

        Z
      "
    />

    <!-- Dress slit: a thin dark line suggesting the lateral slit on the right side -->
    <path
      fill="#0B0608"
      d="
        M 204 340
        C 205 352, 206 366, 206 382
        C 206 398, 205 412, 204 424
        C 203 432, 202 440, 201 448
        L 200 452
        C 200 452, 199 454, 199 456
        L 202 456
        C 203 454, 204 452, 204 450
        C 205 444, 206 436, 207 428
        C 208 416, 209 402, 209 386
        C 209 370, 208 356, 207 344
        Z
      "
    />

    <!-- Waist cinch highlight — a very thin wine-colored accent curve
         suggesting the gathered fabric at the waist -->
    <path
      fill="none"
      stroke="#5C1428"
      stroke-width="1.5"
      stroke-linecap="round"
      d="M 124 194 C 140 188, 160 185, 170 185 C 180 185, 200 188, 216 194"
    />

    <!-- Top edge / neckline of the strapless bustier — a gentle curve -->
    <path
      fill="none"
      stroke="#5C1428"
      stroke-width="1.2"
      stroke-linecap="round"
      d="M 122 112 C 138 104, 156 100, 170 100 C 184 100, 202 104, 218 112"
    />

    <!-- Ornamental dots flanking the icon — cinema noir accent -->
    <circle cx="86"  cy="258" r="2.5" fill="#5C1428"/>
    <circle cx="254" cy="258" r="2.5" fill="#5C1428"/>
    <circle cx="80"  cy="258" r="1.2" fill="#C41E3A" opacity="0.5"/>
    <circle cx="260" cy="258" r="1.2" fill="#C41E3A" opacity="0.5"/>
  </g>

  <!-- ── DIVIDER LINE ── -->
  <line
    x1="308" y1="96" x2="308" y2="416"
    stroke="#5C1428" stroke-width="0.8" opacity="0.9"
  />

  <!-- ── WORDMARK ── -->
  <!-- Using embedded path-based letterforms.
       "RAFAELLA" in large serifed caps, "COSTA" smaller below.
       All text rendered as <path> elements — no external fonts. -->
  <g id="wordmark">

    <!-- Ornamental rule above RAFAELLA -->
    <line x1="338" y1="168" x2="980" y2="168" stroke="#5C1428" stroke-width="0.7" opacity="0.7"/>

    <!-- ══ RAFAELLA ══
         Hand-crafted serifed capital letters as SVG paths.
         Baseline at y=280, cap height ~108px.
         Letter spacing generous. -->

    <!-- R -->
    <path fill="#F5EDE6" d="
      M 348 172
      L 348 280
      L 360 280
      L 360 236
      L 378 236
      L 398 280
      L 412 280
      L 390 233
      C 403 228, 410 218, 410 204
      C 410 185, 397 172, 376 172
      Z
      M 360 183
      L 374 183
      C 386 183, 398 188, 398 205
      C 398 221, 387 226, 374 226
      L 360 226
      Z
    "/>

    <!-- A (first) -->
    <path fill="#F5EDE6" d="
      M 440 172
      L 410 280
      L 422 280
      L 430 252
      L 462 252
      L 470 280
      L 483 280
      L 452 172
      Z
      M 446 183
      L 459 240
      L 433 240
      Z
    "/>

    <!-- F -->
    <path fill="#F5EDE6" d="
      M 496 172
      L 496 280
      L 508 280
      L 508 232
      L 545 232
      L 545 221
      L 508 221
      L 508 183
      L 550 183
      L 550 172
      Z
    "/>

    <!-- A (second) -->
    <path fill="#F5EDE6" d="
      M 578 172
      L 548 280
      L 560 280
      L 568 252
      L 600 252
      L 608 280
      L 621 280
      L 590 172
      Z
      M 584 183
      L 597 240
      L 571 240
      Z
    "/>

    <!-- E -->
    <path fill="#F5EDE6" d="
      M 634 172
      L 634 280
      L 690 280
      L 690 269
      L 646 269
      L 646 232
      L 682 232
      L 682 221
      L 646 221
      L 646 183
      L 688 183
      L 688 172
      Z
    "/>

    <!-- L (first) -->
    <path fill="#F5EDE6" d="
      M 703 172
      L 703 280
      L 752 280
      L 752 269
      L 715 269
      L 715 172
      Z
    "/>

    <!-- L (second) -->
    <path fill="#F5EDE6" d="
      M 764 172
      L 764 280
      L 814 280
      L 814 269
      L 776 269
      L 776 172
      Z
    "/>

    <!-- A (third) -->
    <path fill="#F5EDE6" d="
      M 842 172
      L 812 280
      L 824 280
      L 832 252
      L 864 252
      L 872 280
      L 885 280
      L 854 172
      Z
      M 848 183
      L 861 240
      L 835 240
      Z
    "/>

    <!-- Ornamental rule between RAFAELLA and COSTA -->
    <line x1="338" y1="296" x2="980" y2="296" stroke="#5C1428" stroke-width="0.7" opacity="0.7"/>

    <!-- Ornamental dots row between the two words -->
    <circle cx="580" cy="308" r="1.8" fill="#5C1428"/>
    <circle cx="596" cy="308" r="1.8" fill="#5C1428"/>
    <circle cx="612" cy="308" r="1.8" fill="#5C1428"/>
    <circle cx="628" cy="308" r="1.8" fill="#5C1428"/>
    <circle cx="644" cy="308" r="1.8" fill="#5C1428"/>

    <!-- ══ COSTA ══
         Smaller, wider letter-spacing. Baseline y=370, cap height ~62px.
         Color: #F5EDE6 slightly dimmed to feel like subtitle. -->

    <!-- C -->
    <path fill="#F5EDE6" opacity="0.88" d="
      M 476 322
      C 455 322, 438 340, 438 362
      C 438 384, 455 402, 476 402
      C 490 402, 501 395, 508 384
      L 499 379
      C 494 387, 486 392, 476 392
      C 461 392, 449 379, 449 362
      C 449 345, 461 332, 476 332
      C 486 332, 494 337, 499 345
      L 508 340
      C 501 329, 490 322, 476 322
      Z
    "/>

    <!-- O -->
    <path fill="#F5EDE6" opacity="0.88" d="
      M 548 322
      C 526 322, 509 340, 509 362
      C 509 384, 526 402, 548 402
      C 570 402, 587 384, 587 362
      C 587 340, 570 322, 548 322
      Z
      M 548 332
      C 564 332, 576 345, 576 362
      C 576 379, 564 392, 548 392
      C 532 392, 520 379, 520 362
      C 520 345, 532 332, 548 332
      Z
    "/>

    <!-- S -->
    <path fill="#F5EDE6" opacity="0.88" d="
      M 618 322
      C 603 322, 592 331, 592 345
      C 592 360, 604 365, 618 370
      C 630 374, 638 378, 638 388
      C 638 396, 631 402, 620 402
      C 611 402, 603 397, 598 389
      L 589 394
      C 596 405, 607 412, 620 412
      C 637 412, 649 402, 649 388
      C 649 373, 637 368, 622 362
      C 611 358, 603 354, 603 345
      C 603 337, 610 332, 619 332
      C 627 332, 634 336, 638 343
      L 647 338
      C 641 328, 631 322, 618 322
      Z
    "/>

    <!-- T -->
    <path fill="#F5EDE6" opacity="0.88" d="
      M 660 322
      L 660 332
      L 682 332
      L 682 412
      L 693 412
      L 693 332
      L 715 332
      L 715 322
      Z
    "/>

    <!-- A -->
    <path fill="#F5EDE6" opacity="0.88" d="
      M 754 322
      L 724 412
      L 735 412
      L 743 388
      L 775 388
      L 783 412
      L 795 412
      L 764 322
      Z
      M 759 332
      L 772 376
      L 746 376
      Z
    "/>

    <!-- Ornamental rule below COSTA -->
    <line x1="338" y1="424" x2="980" y2="424" stroke="#5C1428" stroke-width="0.7" opacity="0.7"/>

    <!-- Tagline / designer mark — small ornamental text as abstract strokes -->
    <!-- "DESIGNER DE MODA" suggested by a series of fine dashes + dots -->
    <g opacity="0.45">
      <!-- D E S I G N E R -->
      <rect x="432" y="434" width="8"  height="1.2" fill="#F5EDE6"/>
      <rect x="444" y="434" width="8"  height="1.2" fill="#F5EDE6"/>
      <rect x="456" y="434" width="8"  height="1.2" fill="#F5EDE6"/>
      <rect x="468" y="434" width="8"  height="1.2" fill="#F5EDE6"/>
      <!-- · de · -->
      <circle cx="482" cy="434.6" r="1.5" fill="#C41E3A"/>
      <!-- M O D A -->
      <rect x="490" y="434" width="8"  height="1.2" fill="#F5EDE6"/>
      <rect x="502" y="434" width="8"  height="1.2" fill="#F5EDE6"/>
      <rect x="514" y="434" width="8"  height="1.2" fill="#F5EDE6"/>
      <rect x="526" y="434" width="8"  height="1.2" fill="#F5EDE6"/>
      <!-- · -->
      <circle cx="540" cy="434.6" r="1.5" fill="#C41E3A"/>
      <!-- RIO DE JANEIRO -->
      <rect x="548" y="434" width="8"  height="1.2" fill="#F5EDE6"/>
      <rect x="560" y="434" width="8"  height="1.2" fill="#F5EDE6"/>
      <rect x="572" y="434" width="8"  height="1.2" fill="#F5EDE6"/>
      <rect x="584" y="434" width="8"  height="1.2" fill="#F5EDE6"/>
      <rect x="596" y="434" width="8"  height="1.2" fill="#F5EDE6"/>
      <rect x="608" y="434" width="8"  height="1.2" fill="#F5EDE6"/>
    </g>

  </g>

</svg>
